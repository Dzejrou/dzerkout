<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dzerkout</title>
    <style>
      :root {
        --bg:             #1c1c1e;
        --bg-elevated:    #242426;
        --card:           #2c2c2e;
        --card-subtle:    #3a3a3c;

        --border:         rgba(255,255,255,0.08);
        --border-subtle:  rgba(255,255,255,0.06);
        --border-medium:  rgba(255,255,255,0.12);
        --border-strong:  rgba(255,255,255,0.14);
        --divider:        rgba(255,255,255,0.07);

        --surface-selected:  rgba(255,255,255,0.04);
        --surface-active:    rgba(255,255,255,0.07);
        --surface-disabled:  rgba(255,255,255,0.02);

        --text-primary:   #f2f2f7;
        --text-secondary: #8e8e93;
        --text-muted:     #6b7280;
        --text-faint:     #9ca3af;
        --text-light:     #e5e7eb;
        --text-disabled:  #4b5563;
        --icon-text:      #d1d5db;

        --overlay: rgba(0,0,0,0.6);

        --green:      #2d6a3f;
        --green-text: #6ee7b7;
        --red:        #f87171;
        --red-bg:     rgba(239,68,68,0.08);
        --red-border: rgba(239,68,68,0.25);
        --blue:       #60a5fa;
        --amber:      #f59e0b;

        --green-badge-text:   #4ade80;
        --green-badge-bg:     rgba(34,197,94,0.12);
        --green-badge-border: rgba(34,197,94,0.2);
        --amber-badge-bg:     rgba(245,158,11,0.12);
        --amber-badge-border: rgba(245,158,11,0.2);
        --red-badge-bg:       rgba(239,68,68,0.12);
        --red-badge-border:   rgba(239,68,68,0.2);
        --blue-badge-bg:      rgba(59,130,246,0.12);
        --blue-badge-border:  rgba(59,130,246,0.2);
        --purple:        #a78bfa;
        --purple-bg:     rgba(139,92,246,0.12);
        --purple-border: rgba(139,92,246,0.2);

        /* Typography — static system font stack */
        --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

        /* Layout scale — overridden for mobile landscape via media queries */
        --left-panel-w: 400px;
        --menu-logo-pad-t: 40px;
        --menu-logo-pad-b: 36px;
        --runner-top-pad-y: 10px;
        --runner-btn-h: 44px;
        --runner-ctrl-pad-y: 12px;

        /* Sets detail pane — compact on short screens */
        --detail-fixed-top-pad: 28px 32px 0;
        --detail-fixed-bot-display: block;
        --detail-divider-margin: 20px 0;

        /* Runner timer panels — compact on short screens */
        --runner-timer-pad: 16px 20px;
        --runner-timer-gap: 4px;
        --runner-panel-label-mb: 6px;
        --runner-left-col-gap: 10px;
        --runner-big-clock: clamp(72px, 13vw, 200px);
        --runner-ex-clock: clamp(56px, 9vw, 160px);
        --runner-ex-clock-target: clamp(18px, 2.8vw, 36px);
        --runner-ex-name-mt: 10px;
      }

      /* Tablet-sized landscape: shrink left panels slightly */
      @media (max-width: 960px) and (orientation: landscape) {
        :root {
          --left-panel-w: clamp(240px, 37vw, 340px);
          --menu-logo-pad-t: 20px;
          --menu-logo-pad-b: 14px;
        }
      }

      /* Short landscape (phone + small tablet): compact timers and sets detail */
      @media (max-height: 650px) and (orientation: landscape) {
        :root {
          --detail-fixed-top-pad: 10px 20px 0;
          --detail-fixed-bot-display: none;
          --detail-divider-margin: 8px 0;

          --runner-timer-pad: 8px 14px;
          --runner-timer-gap: 2px;
          --runner-panel-label-mb: 2px;
          --runner-left-col-gap: 5px;
          --runner-big-clock: clamp(40px, 9vh, 200px);
          --runner-ex-clock: clamp(32px, 7vh, 160px);
          --runner-ex-clock-target: clamp(12px, 1.8vh, 36px);
          --runner-ex-name-mt: 4px;
        }
      }

      /* Phone landscape (very short): also compact bars */
      @media (max-height: 480px) and (orientation: landscape) {
        :root {
          --left-panel-w: clamp(220px, 38vw, 280px);
          --menu-logo-pad-t: 8px;
          --menu-logo-pad-b: 6px;
          --runner-top-pad-y: 5px;
          --runner-btn-h: 36px;
          --runner-ctrl-pad-y: 7px;
        }
      }

      *, *::before, *::after { box-sizing: border-box; }
      /* Browsers don't inherit font-family into form controls by default — override that */
      button, input, select, textarea { font-family: inherit; }
      html, body, #root {
        height: 100%; margin: 0; padding: 0;
        background: var(--bg); color: var(--text-primary);
        font-family: var(--font-family);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
